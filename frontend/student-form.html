<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC College | Complete Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <style>
        body { justify-content: center; align-items: center; }
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease-out;
        }
        .form-brand { text-align: center; font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .form-header { text-align: center; margin-bottom: 2rem; }
        .form-header h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .form-header p { color: var(--text-muted); font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            ABC College
        </div>
        <div class="form-header">
            <h2>Complete Your Profile</h2>
            <p>Please provide your official details to activate your ID card.</p>
        </div>
        <form id="studentProfileForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" name="first_name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" class="form-control" name="last_name" required>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" class="form-control" name="dob" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" name="email" required placeholder="email@college.edu">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" class="form-control" name="phone" placeholder="+1 (555) 000-0000">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea class="form-control" name="address" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select class="form-control" name="dept_id" id="profileDeptSelect" required>
                    <option value="">Select Department</option>
                </select>
            </div>
            <div class="form-group">
                <label>Official Photo</label>
                <input type="file" class="form-control" name="photo" accept="image/*">
            </div>
            <div class="login-actions" style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;">Activate Account</button>
            </div>
        </form>
    </div>
    <script src="js/app_v2.js?v=2.0"></script>
    <script>
        // Specific logic for this page after app.js loads
        window.addEventListener('load', () => {
             if (typeof fetchDepartments === 'function') {
                // Ensure departments are loaded into the select
                fetchDepartmentsForProfile();
             }
        });

        async function fetchDepartmentsForProfile() {
            const data = await request('/departments');
            const select = document.getElementById('profileDeptSelect');
            if(select) {
                select.innerHTML = '<option value="">Select Department</option>' + 
                    data.map(d => `<option value="${d.dept_id}">${d.name}</option>`).join('');
            }
        }
    </script>
</body>
</html>
